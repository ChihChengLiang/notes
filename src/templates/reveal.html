<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="{{root}}reveal-base.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
  <link rel="stylesheet" href="{{root}}reveal-theme.css">
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="hand-drawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
<div class="reveal">
  <div class="slides">
    {{slides}}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
<script>
// Set full-viewport backgrounds before Reveal.initialize() so reveal.js picks them up.
// data-background-* fills the entire browser window, unlike CSS background-color on sections.
(function() {
  var root = '{{root}}';
  document.querySelectorAll('.slides section.title-slide').forEach(function(el) {
    el.setAttribute('data-background-color', 'oklch(23.2% 0.043 78)');
    el.setAttribute('data-background-image', root + 'assets/bedge-grunge.png');
    el.setAttribute('data-background-size', 'cover');
    el.setAttribute('data-background-opacity', '0.3');
  });
  document.querySelectorAll('.slides section.chapter').forEach(function(el) {
    el.setAttribute('data-background-color', 'oklch(92.5% 0.040 78)');
    el.setAttribute('data-background-image', root + 'assets/bedge-grunge.png');
    el.setAttribute('data-background-size', 'cover');
  });
  document.querySelectorAll('.slides section:not(.title-slide):not(.chapter)').forEach(function(el) {
    el.setAttribute('data-background-color', 'oklch(99.1% 0.011 78)');
    el.setAttribute('data-background-image', root + 'assets/bedge-grunge.png');
    el.setAttribute('data-background-size', 'cover');
  });
})();
</script>
<script type="module">
import { initMermaid, mermaid } from '{{root}}mermaid-init.js';

initMermaid({ startOnLoad: false });

Reveal.initialize({
  hash: true,
  slideNumber: 'c/t',
  transition: 'fade',
  backgroundTransition: 'fade',
});

Reveal.on('ready', () => {
  mermaid.run({ querySelector: 'pre.mermaid' });
});
</script>
</body>
</html>
