<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{page_title}}</title>
  <meta property="og:title" content="{{og_title}}">
  <meta property="og:description" content="{{og_description}}">
  <meta name="description" content="{{og_description}}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
  <script>document.documentElement.className = localStorage.getItem('cc-theme') || 'light';</script>
  <script src="/client.js"></script>
  <script type="module" src="/mermaid-init.js"></script>
</head>
<body>
<!-- SVG filter for hand-drawn table border jitter — filter targets ::before pseudo only, text is unaffected -->
<svg width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <filter id="hand-drawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
<div class="theme-bar">
  <div class="theme-seg" role="group" aria-label="Theme">
    <button class="theme-btn" data-theme="light">light</button>
    <button class="theme-btn" data-theme="dark">dark</button>
  </div>
</div>
  {{content}}
<script>
(function() {
  var current = document.documentElement.className || 'light';
  var btns = document.querySelectorAll('.theme-btn');
  function setTheme(t) {
    document.documentElement.className = t;
    localStorage.setItem('cc-theme', t);
    btns.forEach(function(b) { b.setAttribute('aria-pressed', String(b.dataset.theme === t)); });
  }
  btns.forEach(function(b) {
    b.setAttribute('aria-pressed', String(b.dataset.theme === current));
    b.addEventListener('click', function() { setTheme(b.dataset.theme); });
  });
})();
</script>
</body>
</html>
